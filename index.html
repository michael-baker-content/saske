<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Saske · PF2e</title>

<!-- Favicons -->
<link rel="icon" type="image/x-icon" href="favicon.ico"/>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"/>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<!-- Styles (dependency order: base → components → medicine → inventory) -->
<link rel="stylesheet" href="css/base.css"/>
<link rel="stylesheet" href="css/components.css"/>
<link rel="stylesheet" href="css/medicine.css"/>
<link rel="stylesheet" href="css/inventory.css"/>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <p>Loading character…</p>
</div>

<div id="shell" style="display:none">
  <div id="header">
    <div class="hdr-top">
      <div class="hdr-avatar">
        <img src="saske.png" alt="Saske Ullaell" width="72" height="72"/>
      </div>
      <div class="hdr-info">
        <div class="char-name" id="h-name"></div>
        <div class="char-sub"  id="h-sub"></div>
        <div class="hp-bar-row">
          <div class="hp-bar-wrap">
            <div class="hp-bar-track">
              <div class="hp-bar-seg" id="hp-bar-normal"></div>
              <div class="hp-bar-seg hp-bar-temp" id="hp-bar-temp"></div>
            </div>
          </div>
          <div class="hp-nums"><span class="cur" id="hp-cur">—</span><span id="hp-max-lbl"></span></div>
        </div>
      </div>
    </div>
    <!-- HP controls row -->
    <div class="hp-strip">
      <input class="hp-in" type="number" id="hp-amt" placeholder="Amt" min="1"/>
      <button class="strip-btn dmg"  id="hp-amt-dmg" ontouchstart="" onclick="changeHP(-1)">− Dmg</button>
      <button class="strip-btn heal" id="hp-amt-heal" ontouchstart="" onclick="changeHP(1)">+ Heal</button>
      <button class="strip-btn tmp-toggle" id="saske-tmp-toggle" ontouchstart="" onclick="toggleTmpStrip('saske')" title="Temporary HP">+ Temp</button>
      <button class="strip-btn"      id="saske-rest" ontouchstart="" onclick="fullRest()" title="Full Rest">⟳ Rest</button>
    </div>
    <!-- Temp HP row (hidden by default) -->
    <div class="tmp-strip" id="saske-tmp-strip" style="display:none">
      <span class="tmp-label">Temp</span>
      <input class="hp-in" type="number" id="tmp-amt" placeholder="0" min="0" value="0"/>
      <button class="strip-btn tmp-set" ontouchstart="" onclick="setTmpHP()">Set</button>
      <button class="strip-btn tmp-clr" ontouchstart="" onclick="clearTmpHP()">Clear</button>
      <span class="tmp-current" id="tmp-cur" style="margin-left:auto"></span>
    </div>
    <div id="tabs"></div>
  </div>

  <div id="panels">
    <div class="panels-track" id="track">
      <div class="panel" id="p-combat"></div>
      <div class="panel" id="p-companion"></div>
      <div class="panel" id="p-skills"></div>
      <div class="panel" id="p-inventory"></div>
      <div class="panel" id="p-info"></div>
    </div>
  </div>

  <!-- Attack roll modal -->
  <div id="atk-modal-backdrop" ontouchstart="" onclick="closeModal(event)">
    <div id="atk-modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-weapon-name">Weapon</span>
        <button class="modal-close" ontouchstart="" onclick="closeModalDirect()">✕</button>
      </div>
      <div class="modal-section-label">Attack Roll</div>
      <div class="modal-row">
        <div>
          <div class="modal-input-label" style="margin-bottom:3px">d20 roll</div>
          <input class="modal-input" type="number" id="modal-d20" placeholder="—" min="1" max="20"/>
        </div>
        <div style="font-size:22px;color:var(--text3);align-self:flex-end;padding-bottom:6px">+</div>
        <div>
          <div class="modal-input-label" style="margin-bottom:3px">Modifier</div>
          <input class="modal-input" id="modal-atk-mod" type="text" readonly style="color:var(--amber);cursor:default;text-align:center"/>
        </div>
        <div style="font-size:22px;color:var(--text3);align-self:flex-end;padding-bottom:6px">=</div>
        <div>
          <div class="modal-input-label" style="margin-bottom:3px">Total</div>
          <input class="modal-input" id="modal-atk-total" type="number" readonly style="color:var(--text3);cursor:default;font-size:22px"/>
        </div>
      </div>
      <div class="modal-section-label" style="margin-bottom:6px">Multiple Attack Penalty</div>
      <div class="modal-map-btns" style="margin-bottom:12px">
        <button class="map-btn active" ontouchstart="" onclick="setMAP(0,this)">First</button>
        <button class="map-btn" id="map-btn-2" ontouchstart="" onclick="setMAP(-1,this)">Second</button>
        <button class="map-btn" id="map-btn-3" ontouchstart="" onclick="setMAP(-2,this)">Third</button>
        <button class="map-btn" id="crit-toggle-btn" ontouchstart="" onclick="toggleCrit()" style="border-color:var(--red);color:var(--text3)">Crit</button>
      </div>
      <div id="prey-bonus-row" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:rgba(176,48,48,0.12);border:1px solid var(--red);border-radius:4px;margin-bottom:10px">
          <span style="font-size:12px;color:var(--text2)"><span id="prey-bonus-label" style="color:var(--red-b)"></span></span>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none">
            <span style="font-size:11px;color:var(--text2)">Attacking prey</span>
            <div class="tog" id="prey-tog" ontouchstart="" onclick="togglePreyAttack()"><div class="tog-knob"></div></div>
          </label>
        </div>
      </div>
      <hr class="modal-divider"/>
      <div class="modal-section-label">Damage Dice</div>
      <div id="modal-dmg-inputs" class="modal-row"></div>
      <div id="precision-row" class="modal-row" style="display:none">
        <div>
          <div class="modal-input-label" style="margin-bottom:3px">Precision die (d8)</div>
          <input class="modal-input" type="number" id="modal-precision-die" placeholder="—" min="1" max="8"/>
        </div>
        <div style="font-size:12px;color:var(--green-b);align-self:flex-end;padding-bottom:8px">1st hit vs Prey</div>
      </div>
      <button class="modal-calc-btn" ontouchstart="" onclick="calcResults()">Calculate</button>
      <div class="result-grid" id="result-grid" style="display:none">
        <div class="result-box hit">
          <div class="result-val" id="res-atk">—</div>
          <div class="result-label">Attack Total</div>
          <div class="result-breakdown" id="res-atk-break"></div>
        </div>
        <div class="result-box dmg">
          <div class="result-val" id="res-dmg">—</div>
          <div class="result-label">Damage Total</div>
          <div class="result-breakdown" id="res-dmg-break"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Global stat tooltip -->
  <div id="stat-tooltip"></div>

  <!-- Item detail modal -->
  <div id="inv-modal-backdrop" style="display:none" ontouchstart="" onclick="invCloseModal(event)">
    <div id="inv-modal">
      <div class="modal-header">
        <span class="modal-title">Edit Item</span>
        <button class="modal-close" ontouchstart="" onclick="invCloseModalDirect()">✕</button>
      </div>
      <div class="inv-modal-body">
        <div class="inv-modal-fields">
          <div class="inv-field-group" style="grid-column:1/-1">
            <label class="inv-field-label">Name *</label>
            <input class="inv-input" id="inv-edit-name" type="text" placeholder="Item name"/>
          </div>
          <div class="inv-field-group" style="grid-column:1/-1">
            <label class="inv-field-label">Description <span style="font-size:10px;color:var(--text3);font-weight:400">(shown on tap/hover)</span></label>
            <input class="inv-input" id="inv-edit-desc" type="text" placeholder="Brief item description…"/>
          </div>
          <div class="inv-field-group">
            <label class="inv-field-label">Bulk *</label>
            <input class="inv-input" id="inv-edit-bulk" type="text" placeholder="1 / L / —"/>
          </div>
          <div class="inv-field-group">
            <label class="inv-field-label">Qty</label>
            <input class="inv-input" id="inv-edit-qty" type="number" placeholder="—" min="1"/>
          </div>
          <div class="inv-field-group" style="grid-column:1/-1">
            <label class="inv-field-label">Notes</label>
            <input class="inv-input" id="inv-edit-notes" type="text" placeholder="Optional"/>
          </div>
          <div class="inv-field-group" style="grid-column:1/-1;display:flex;align-items:center;gap:8px">
            <div class="tog" id="inv-edit-ammo-tog" ontouchstart="" onclick="toggleEditAmmo()"><div class="tog-knob"></div></div>
            <span class="inv-field-label" style="font-size:11px">Ammunition</span>
            <div id="inv-edit-ammo-fields" style="display:none;align-items:center;gap:6px">
              <label class="inv-field-label">per bundle:</label>
              <input class="inv-input" id="inv-edit-ammo-per" type="number" placeholder="10" min="1" style="width:54px"/>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:14px">
          <button class="btn gold" style="flex:1" ontouchstart="" onclick="invSaveEdit()">Save</button>
          <button class="btn danger" ontouchstart="" onclick="invDeleteEdit()">Delete</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Scripts (dependency order) -->
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/sync.js"></script>
<script src="js/actions.js"></script>
<script src="js/medicine.js"></script>
<script src="js/modal.js"></script>
<script src="js/panels-shared.js"></script>
<script src="js/panels-combat.js"></script>
<script src="js/panels-skills.js"></script>
<script src="js/panels-info.js"></script>
<script src="js/panels-inventory.js"></script>
<script src="js/navigation.js"></script>

<!-- Feat description modal -->
<div id="feat-modal-backdrop" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;padding:16px" ontouchstart="" onclick="featModalClose(event)">
  <div id="feat-modal" style="background:var(--bg2);border:1px solid var(--border2);border-radius:8px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.5);overflow:hidden">
    <div class="modal-header">
      <span class="modal-title" id="feat-modal-title">Feat</span>
      <button class="modal-close" ontouchstart="" onclick="featModalCloseDirect()">✕</button>
    </div>
    <div style="padding:14px 16px 16px">
      <div id="feat-source-row" style="display:none;margin-bottom:10px">
        <label style="font-size:11px;color:var(--text3);font-weight:600;letter-spacing:0.06em;text-transform:uppercase">Source</label>
        <input class="inv-input" id="feat-source-input" type="text" placeholder="Source item…" style="margin-top:4px"/>
      </div>
      <label style="font-size:11px;color:var(--text3);font-weight:600;letter-spacing:0.06em;text-transform:uppercase">Description <span style="font-weight:400;text-transform:none;color:var(--text3)">(tap/hover text)</span></label>
      <textarea id="feat-desc-input" class="note-area" style="margin-top:6px;min-height:100px;font-size:16px"
        placeholder="Add notes about this feat — mechanics, uses, interactions…"></textarea>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn gold" style="flex:1" ontouchstart="" onclick="saveFeatDesc()">Save</button>
        <button class="btn" ontouchstart="" onclick="clearFeatDesc()" style="color:var(--text3)">Clear</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
